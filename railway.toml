[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @snap-grid/shared build && pnpm --filter @snap-grid/client build"

[deploy]
startCommand = "node packages/server/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "production"
